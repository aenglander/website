name: build-and-test-actions
on: [push, pull_request]
jobs:
  test-build:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
      - name: Setup NodeJS
        uses: actions/setup-node@v2
        with:
          node-version: '10'
      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install Lektor
        run: pip install Lektor
      - name: Build site
        run: lektor build -f webpack --output-path build
      - name: Archive site build
        uses: actions/upload-artifact@v2
        with:
          name: site-build
          path: build

